<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Anime Finder</title>
    <!--
      Single-Page-App redirect for GitHub Pages.
      Deep links (e.g. /Anime-Site/favorites) 404 on a static host because no
      such file exists. GitHub serves this 404.html, which rewrites the URL into
      a query string and bounces to the app root, where the snippet in
      index.html restores the original path for the router.
      pathSegmentsToKeep = 1 keeps the "/Anime-Site" project base.
      See https://github.com/rafgraph/spa-github-pages
    -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 1
      var l = window.location
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      )
    </script>
  </head>
  <body></body>
</html>
